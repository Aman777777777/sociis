<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Governance — SociisGroup</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap');
  :root {
    --cream: #F4F0E8;
    --cream-deep: #EDE7DA;
    --ink: #0F1624;
    --ink-text: #1A1A14;
    --ink-text-soft: #2C2C20;
    --gold: #9F7D2A;
    --rule: rgba(15,22,36,0.12);
    --max: 1180px;
    --pad: 56px;
    --pad-lg: 88px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--cream-deep);
    color: var(--ink-text);
    font-family: 'Inter', sans-serif;
    font-weight: 300;
    font-size: 16px;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }
  .nav-bar {
    padding: 28px var(--pad);
    border-bottom: 1px solid var(--rule);
    display: flex; justify-content: space-between; align-items: center;
    background: var(--cream);
  }
  .nav-bar a {
    font-family: 'Inter', sans-serif; font-size: 12px; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--ink); text-decoration: none;
  }
  .nav-bar .brand { font-family: 'Cormorant Garamond', serif; font-size: 22px; letter-spacing: 0.02em; text-transform: none; }
  .mono-kicker {
    font-family: 'Inter', sans-serif; font-size: 11px; letter-spacing: 0.32em;
    text-transform: uppercase; color: var(--gold); font-weight: 500;
  }
  .display-l {
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
    font-size: clamp(40px, 5vw, 64px); line-height: 1.05; color: var(--ink);
    letter-spacing: -0.01em;
  }
  .rule { width: 80px; height: 1px; background: var(--gold); margin: 28px 0 32px; }
  .body-text { font-size: 17px; line-height: 1.75; color: var(--ink-text-soft); }
  section.gov {
    padding: var(--pad-lg) var(--pad);
  }
  .inner { max-width: var(--max); margin: 0 auto; }
  h3.group-title {
    font-family: 'Cormorant Garamond', serif; font-weight: 400;
    font-size: 28px; color: var(--ink); margin-bottom: 28px;
  }
  .gov-grid {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 28px; margin-bottom: 64px;
  }
  .gov-card { margin: 0; }
  .gov-card img {
    width: 100%; aspect-ratio: 1/1; object-fit: cover; display: block;
    filter: grayscale(100%); transition: filter 0.5s ease;
  }
  .gov-card:hover img { filter: grayscale(0%); }
  .gov-card figcaption {
    margin-top: 12px; font-family: 'Inter', sans-serif; font-size: 12px;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-text-soft);
  }
  #scrollTopBtn {
    position: fixed; bottom: 24px; right: 24px; z-index: 50;
    width: 40px; height: 40px; border: none; cursor: pointer;
    background: rgba(15,22,36,0.6); color: var(--cream);
    display: flex; align-items: center; justify-content: center;
    border-radius: 4px; opacity: 0; transform: translateY(16px);
    pointer-events: none; transition: opacity 0.3s ease, transform 0.3s ease, background 0.3s ease;
    font-size: 18px; line-height: 1;
  }
  #scrollTopBtn.visible { opacity: 0.6; transform: translateY(0); pointer-events: auto; }
  #scrollTopBtn.visible:hover { opacity: 1; background: rgba(15,22,36,0.8); }
  @media (max-width: 768px) {
    .gov-grid { grid-template-columns: repeat(2, 1fr); gap: 18px; }
    section.gov { padding: 56px 24px; }
    .nav-bar { padding: 20px 24px; }
  }
</style>
</head>
<body>

<nav class="nav-bar">
  <a href="/site.html" class="brand">SociisGroup</a>
  <a href="/site.html">← Back</a>
</nav>

<section class="gov">
  <div class="inner">
    <div class="mono-kicker">Governance</div>
    <h2 class="display-l" style="margin-top: 20px;">Institutional Leadership.</h2>
    <div class="rule"></div>
    <p class="body-text" style="max-width: 720px; margin-bottom: 56px;">
      SociisGroup is governed by a small circle of institutional leaders, strategic contributors and an Ethical Council that safeguards the LIME Code.
    </p>

    <h3 class="group-title">Institutional Leadership</h3>
    <div class="gov-grid">
      <figure class="gov-card"><img src="/team/jeremie.png" alt="Jérémie"><figcaption>Jérémie</figcaption></figure>
      <figure class="gov-card"><img src="/team/dominique-new.jpg" alt="Dominique"><figcaption>Dominique</figcaption></figure>
      <figure class="gov-card"><img src="/team/chantal-new.png" alt="Chantal"><figcaption>Chantal</figcaption></figure>
      <figure class="gov-card"><img src="/team/joost-new.jpeg" alt="Joost"><figcaption>Joost</figcaption></figure>
    </div>

    <h3 class="group-title">Strategic & Institutional Contributors</h3>
    <div class="gov-grid">
      <figure class="gov-card"><img src="/team/luc.jpg" alt="Luc"><figcaption>Luc</figcaption></figure>
      <figure class="gov-card"><img src="/team/marc.jpg" alt="Marc"><figcaption>Marc</figcaption></figure>
      <figure class="gov-card"><img src="/team/karim.jpg" alt="Karim"><figcaption>Karim</figcaption></figure>
      <figure class="gov-card"><img src="/team/lars.jpg" alt="Lars"><figcaption>Lars</figcaption></figure>
      <figure class="gov-card"><img src="/team/peter.png" alt="Peter"><figcaption>Peter</figcaption></figure>
      <figure class="gov-card"><img src="/team/richard.jpg" alt="Richard"><figcaption>Richard</figcaption></figure>
      <figure class="gov-card"><img src="/team/rudi.png" alt="Rudi"><figcaption>Rudi</figcaption></figure>
      <figure class="gov-card"><img src="/team/tim.png" alt="Tim"><figcaption>Tim</figcaption></figure>
    </div>

    <h3 class="group-title">The Sociis Ethical Council</h3>
    <div class="gov-grid">
      <figure class="gov-card"><img src="/team/sarah-m.jpg" alt="Sarah"><figcaption>Sarah</figcaption></figure>
      <figure class="gov-card"><img src="/team/eva.jpeg" alt="Eva"><figcaption>Eva</figcaption></figure>
      <figure class="gov-card"><img src="/team/tatiana.png" alt="Tatiana"><figcaption>Tatiana</figcaption></figure>
      <figure class="gov-card"><img src="/team/zanele.jpg" alt="Zanele"><figcaption>Zanele</figcaption></figure>
      <figure class="gov-card"><img src="/team/sandrine.jpg" alt="Sandrine"><figcaption>Sandrine</figcaption></figure>
      <figure class="gov-card"><img src="/team/anmarrie.jpg" alt="Anne-Marie"><figcaption>Anne-Marie</figcaption></figure>
      <figure class="gov-card"><img src="/team/jan.jpg" alt="Jan"><figcaption>Jan</figcaption></figure>
      <figure class="gov-card"><img src="/team/micael-c.jpg" alt="Micael"><figcaption>Micael</figcaption></figure>
    </div>
  </div>
</section>

<button id="scrollTopBtn" aria-label="Scroll to top">↑</button>
<script>
  (function(){
    var btn = document.getElementById('scrollTopBtn');
    function onScroll(){
      var pct = window.scrollY / (document.documentElement.scrollHeight - window.innerHeight);
      if (pct > 0.25) btn.classList.add('visible'); else btn.classList.remove('visible');
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    btn.addEventListener('click', function(){ window.scrollTo({ top: 0, behavior: 'smooth' }); });
  })();
</script>

</body>
</html>
